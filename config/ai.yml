# ---------------------------------------------------------------------------
# Naxeu AI configuration.
#
# Toggle behaviour via environment variables referenced below with `${VAR}`
# or `${VAR:-default}` (bash-style default when the variable is missing or
# blank after trim). Values are resolved when the process loads this file; see
# `packages/config` (`interpolateEnv`, `coerceAiYamlForSchema`, `applyAiDerivedRules`).
#
# --- Secrets / endpoints (optional strings; empty → dropped in normalization) ---
#   OPENAI_API_KEY          → providers.openai.apiKey
#   OPENAI_BASE_URL         → optional custom / proxy OpenAI API base URL
#   ANTHROPIC_API_KEY       → providers.anthropic.apiKey
#   OLLAMA_BASE_URL         → providers.local.baseUrl (default if unset/empty:
#                             http://localhost:11434/v1)
#   OLLAMA_API_KEY          → providers.local.apiKey (default if unset/empty: local)
#
# --- Switches (set in `.env` or container env; names mirror `.env.example`) ---
#   AI_ENABLED              → global on/off (`true` / `false` / `1` / `0` / …)
#   AI_DEFAULT_PROVIDER     → provider id used for tasks still on `mock` below
#   AI_TASK_<UPPER_SNAKE>_PROVIDER, AI_TASK_<UPPER_SNAKE>_MODEL
#       Task suffixes: QUICK_INPUT_PARSING, TRANSACTION_CATEGORIZATION,
#       ATTACHMENT_EXTRACTION, MONTHLY_SUMMARY, IMPORT_COLUMN_MAPPING
#
# If `AI_ENABLED` is unset in the **process environment**, a live default or task
# provider still turns AI on (`applyAiDerivedRules`). Set `AI_ENABLED=false` there
# to force heuristics regardless of YAML-interpolated values.
#
# See `.env.example` and `docker-compose.yml` for wiring into containers.
# ---------------------------------------------------------------------------
ai:
  enabled: "${AI_ENABLED:-false}"
  defaultProvider: "${AI_DEFAULT_PROVIDER:-mock}"

  providers:
    mock:
      type: mock

    openai:
      type: openai
      apiKey: "${OPENAI_API_KEY}"
      baseUrl: "${OPENAI_BASE_URL}"

    anthropic:
      type: anthropic
      apiKey: "${ANTHROPIC_API_KEY}"

    local:
      type: openai-compatible
      baseUrl: "${OLLAMA_BASE_URL}"
      apiKey: "${OLLAMA_API_KEY}"

  tasks:
    quickInputParsing:
      provider: "${AI_TASK_QUICK_INPUT_PARSING_PROVIDER:-mock}"
      model: "${AI_TASK_QUICK_INPUT_PARSING_MODEL:-mock}"

    transactionCategorization:
      provider: "${AI_TASK_TRANSACTION_CATEGORIZATION_PROVIDER:-mock}"
      model: "${AI_TASK_TRANSACTION_CATEGORIZATION_MODEL:-mock}"

    attachmentExtraction:
      provider: "${AI_TASK_ATTACHMENT_EXTRACTION_PROVIDER:-mock}"
      model: "${AI_TASK_ATTACHMENT_EXTRACTION_MODEL:-mock}"

    monthlySummary:
      provider: "${AI_TASK_MONTHLY_SUMMARY_PROVIDER:-mock}"
      model: "${AI_TASK_MONTHLY_SUMMARY_MODEL:-mock}"

    importColumnMapping:
      provider: "${AI_TASK_IMPORT_COLUMN_MAPPING_PROVIDER:-mock}"
      model: "${AI_TASK_IMPORT_COLUMN_MAPPING_MODEL:-mock}"
