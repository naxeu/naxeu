# Local development: hot reload (Vite + tsx watch). Merge with the main stack:
#
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# API/worker load optional `env_file: .env` (when present). AI and provider keys are referenced
# from `config/ai.yml` via `${VAR}` / `${VAR:-default}`; `.env` supplies the values at runtime.
#
# Rebuild the dev image when pnpm-lock.yaml or root manifests change; source edits
# under ./apps and ./packages apply immediately via bind mounts.

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: development
      # Must match worker + volume so Beleg-Dateien vom Worker gelesen werden können
      STORAGE_DIR: /data/storage
    volumes:
      - naxeu_storage:/data/storage
      - ./apps:/app/apps
      - ./packages:/app/packages
      - ./config:/app/config
      - ./branding:/app/branding
    command:
      [
        "sh",
        "-c",
        "pnpm --filter @naxeu/db migrate && pnpm --filter @naxeu/db seed && pnpm dev:api",
      ]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 90s

  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: development
      STORAGE_DIR: /data/storage
    volumes:
      - naxeu_storage:/data/storage
      - ./apps:/app/apps
      - ./packages:/app/packages
      - ./config:/app/config
      - ./branding:/app/branding
    command: ["pnpm", "dev:worker"]

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:3000}
    volumes:
      - ./apps:/app/apps
      - ./packages:/app/packages
      - ./config:/app/config
      - ./branding:/app/branding
    command: ["pnpm", "dev:web"]
