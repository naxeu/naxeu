# Naxeu Community Edition — local Docker stack.
# Start everything with:  docker compose up --build
# Dev (hot reload):        docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
# PWA:  http://localhost:5173   API:  http://localhost:3000   Health: /health
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-naxeu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-naxeu}
      POSTGRES_DB: ${POSTGRES_DB:-naxeu}
    ports:
      - "5432:5432"
    volumes:
      - naxeu_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-naxeu}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-naxeu}:${POSTGRES_PASSWORD:-naxeu}@postgres:5432/${POSTGRES_DB:-naxeu}
      REDIS_URL: redis://redis:6379
      API_HOST: 0.0.0.0
      API_PORT: "3000"
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-please-32-chars-min}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      CONFIG_DIR: /app/config
      STORAGE_DIR: /data/storage
      BRANDING_DIR: /app/branding
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:noreply@naxeu.com}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      AI_ENABLED: ${AI_ENABLED:-}
      AI_DEFAULT_PROVIDER: ${AI_DEFAULT_PROVIDER:-}
      AI_TASK_QUICK_INPUT_PARSING_PROVIDER: ${AI_TASK_QUICK_INPUT_PARSING_PROVIDER:-}
      AI_TASK_QUICK_INPUT_PARSING_MODEL: ${AI_TASK_QUICK_INPUT_PARSING_MODEL:-}
      AI_TASK_TRANSACTION_CATEGORIZATION_PROVIDER: ${AI_TASK_TRANSACTION_CATEGORIZATION_PROVIDER:-}
      AI_TASK_TRANSACTION_CATEGORIZATION_MODEL: ${AI_TASK_TRANSACTION_CATEGORIZATION_MODEL:-}
      AI_TASK_ATTACHMENT_EXTRACTION_PROVIDER: ${AI_TASK_ATTACHMENT_EXTRACTION_PROVIDER:-}
      AI_TASK_ATTACHMENT_EXTRACTION_MODEL: ${AI_TASK_ATTACHMENT_EXTRACTION_MODEL:-}
      AI_TASK_MONTHLY_SUMMARY_PROVIDER: ${AI_TASK_MONTHLY_SUMMARY_PROVIDER:-}
      AI_TASK_MONTHLY_SUMMARY_MODEL: ${AI_TASK_MONTHLY_SUMMARY_MODEL:-}
      AI_TASK_IMPORT_COLUMN_MAPPING_PROVIDER: ${AI_TASK_IMPORT_COLUMN_MAPPING_PROVIDER:-}
      AI_TASK_IMPORT_COLUMN_MAPPING_MODEL: ${AI_TASK_IMPORT_COLUMN_MAPPING_MODEL:-}
    ports:
      - "3000:3000"
    volumes:
      - naxeu_storage:/data/storage
      - ./config:/app/config:ro
      - ./branding:/app/branding:ro
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-naxeu}:${POSTGRES_PASSWORD:-naxeu}@postgres:5432/${POSTGRES_DB:-naxeu}
      REDIS_URL: redis://redis:6379
      CONFIG_DIR: /app/config
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:noreply@naxeu.com}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      AI_ENABLED: ${AI_ENABLED:-}
      AI_DEFAULT_PROVIDER: ${AI_DEFAULT_PROVIDER:-}
      AI_TASK_QUICK_INPUT_PARSING_PROVIDER: ${AI_TASK_QUICK_INPUT_PARSING_PROVIDER:-}
      AI_TASK_QUICK_INPUT_PARSING_MODEL: ${AI_TASK_QUICK_INPUT_PARSING_MODEL:-}
      AI_TASK_TRANSACTION_CATEGORIZATION_PROVIDER: ${AI_TASK_TRANSACTION_CATEGORIZATION_PROVIDER:-}
      AI_TASK_TRANSACTION_CATEGORIZATION_MODEL: ${AI_TASK_TRANSACTION_CATEGORIZATION_MODEL:-}
      AI_TASK_ATTACHMENT_EXTRACTION_PROVIDER: ${AI_TASK_ATTACHMENT_EXTRACTION_PROVIDER:-}
      AI_TASK_ATTACHMENT_EXTRACTION_MODEL: ${AI_TASK_ATTACHMENT_EXTRACTION_MODEL:-}
      AI_TASK_MONTHLY_SUMMARY_PROVIDER: ${AI_TASK_MONTHLY_SUMMARY_PROVIDER:-}
      AI_TASK_MONTHLY_SUMMARY_MODEL: ${AI_TASK_MONTHLY_SUMMARY_MODEL:-}
      AI_TASK_IMPORT_COLUMN_MAPPING_PROVIDER: ${AI_TASK_IMPORT_COLUMN_MAPPING_PROVIDER:-}
      AI_TASK_IMPORT_COLUMN_MAPPING_MODEL: ${AI_TASK_IMPORT_COLUMN_MAPPING_MODEL:-}

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:3000}
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5173:5173"

volumes:
  naxeu_pgdata:
  naxeu_storage:
